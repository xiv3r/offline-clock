<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chronos Nexus v4.0 - Temporal Command System</title>
    <style>
        :root {
            --bg-deep: #020208;
            --bg-card: #0a0a16;
            --cyan: #00e5ff;
            --cyan-dim: #006880;
            --magenta: #ff0088;
            --magenta-dim: #600035;
            --gold: #ffb800;
            --green: #00ff66;
            --white: #e8e8f0;
            --gray: #6a6a8a;
            --glass: rgba(12, 12, 28, 0.75);
            --glass-border: rgba(255, 255, 255, 0.06);
            --glow-cyan: 0 0 40px rgba(0, 229, 255, 0.5), 0 0 80px rgba(0, 229, 255, 0.2);
            --glow-magenta: 0 0 40px rgba(255, 0, 136, 0.5), 0 0 80px rgba(255, 0, 136, 0.2);
            --glow-gold: 0 0 30px rgba(255, 184, 0, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-deep);
            font-family: 'Inter', 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: default;
            user-select: none;
            -webkit-user-select: none;
        }

        /* ============ CANVAS LAYERS ============ */
        .canvas-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        #starfieldCanvas { z-index: 0; }
        #gridCanvas { z-index: 0; }
        #particleCanvas { z-index: 1; }

        /* ============ MAIN LAYOUT ============ */
        .command-center {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            perspective: 1200px;
        }

        /* ============ ORBITING SYSTEM ============ */
        .orbital-system {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: -1;
        }

        .orbit {
            position: absolute;
            border-radius: 50%;
            border: 1px solid transparent;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .orbit-1 { width: 620px; height: 620px; border-color: rgba(0, 229, 255, 0.06); animation: orbitSpin 40s linear infinite; }
        .orbit-2 { width: 560px; height: 560px; border-color: rgba(255, 0, 136, 0.05); animation: orbitSpin 35s linear infinite reverse; }
        .orbit-3 { width: 500px; height: 500px; border-color: rgba(255, 184, 0, 0.04); animation: orbitSpin 45s linear infinite; }
        .orbit-4 { width: 440px; height: 440px; border-color: rgba(0, 229, 255, 0.03); animation: orbitSpin 50s linear infinite reverse; }

        @keyframes orbitSpin {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .orbit-node {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            top: -4px;
            left: 50%;
            transform: translateX(-50%);
        }

        .orbit-1 .orbit-node { background: var(--cyan); box-shadow: var(--glow-cyan); }
        .orbit-2 .orbit-node { background: var(--magenta); box-shadow: var(--glow-magenta); }
        .orbit-3 .orbit-node { background: var(--gold); box-shadow: var(--glow-gold); }
        .orbit-4 .orbit-node { background: var(--green); box-shadow: 0 0 25px rgba(0, 255, 102, 0.5); }

        /* Secondary orbiting nodes */
        .orbit-node-2 {
            position: absolute;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            bottom: -3px;
            left: 30%;
            transform: translateX(-50%);
        }
        .orbit-1 .orbit-node-2 { background: rgba(0, 229, 255, 0.6); }
        .orbit-2 .orbit-node-2 { background: rgba(255, 0, 136, 0.6); }
        .orbit-3 .orbit-node-2 { background: rgba(255, 184, 0, 0.6); }

        /* ============ MAIN CARD ============ */
        .main-card {
            background: var(--glass);
            backdrop-filter: blur(60px);
            -webkit-backdrop-filter: blur(60px);
            border: 1px solid var(--glass-border);
            border-radius: 36px;
            padding: 40px 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
            box-shadow: 0 30px 100px rgba(0, 0, 0, 0.7),
                        0 0 0 1px rgba(255, 255, 255, 0.03) inset,
                        0 1px 0 rgba(255, 255, 255, 0.04) inset;
            position: relative;
            overflow: hidden;
            transform-style: preserve-3d;
            animation: cardFloat 8s ease-in-out infinite;
        }

        @keyframes cardFloat {
            0%, 100% { transform: translateY(0px) rotateX(1deg); }
            25% { transform: translateY(-8px) rotateX(-0.5deg); }
            50% { transform: translateY(-3px) rotateX(1.5deg); }
            75% { transform: translateY(-10px) rotateX(-1deg); }
        }

        /* Edge highlight scan line */
        .main-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.015), transparent);
            animation: cardScan 6s ease-in-out infinite;
            pointer-events: none;
            z-index: 20;
        }

        @keyframes cardScan {
            0% { left: -100%; }
            50% { left: 120%; }
            100% { left: 120%; }
        }

        /* Corner accents */
        .corner-accent {
            position: absolute;
            width: 30px;
            height: 30px;
            pointer-events: none;
            z-index: 2;
        }
        .corner-accent::before,
        .corner-accent::after {
            content: '';
            position: absolute;
            background: var(--cyan);
            opacity: 0.5;
        }
        .corner-tl { top: 16px; left: 16px; }
        .corner-tr { top: 16px; right: 16px; }
        .corner-bl { bottom: 16px; left: 16px; }
        .corner-br { bottom: 16px; right: 16px; }
        .corner-tl::before, .corner-br::before { width: 100%; height: 2px; top: 0; left: 0; }
        .corner-tl::after, .corner-br::after { width: 2px; height: 100%; top: 0; left: 0; }
        .corner-tr::before, .corner-bl::before { width: 100%; height: 2px; top: 0; right: 0; }
        .corner-tr::after, .corner-bl::after { width: 2px; height: 100%; bottom: 0; right: 0; }

        /* ============ PRIMARY TIME DISPLAY ============ */
        .time-section {
            position: relative;
            z-index: 3;
            text-align: center;
        }

        .time-label-top {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 8px;
            color: var(--gray);
            margin-bottom: 10px;
            font-weight: 500;
        }

        .time-main {
            font-size: 130px;
            font-weight: 150;
            letter-spacing: -6px;
            font-family: 'SF Mono', 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
            font-variant-numeric: tabular-nums;
            line-height: 0.9;
            background: linear-gradient(180deg, #ffffff 5%, #b0b0d0 50%, #606080 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 50px rgba(180, 200, 255, 0.35));
            transition: all 0.05s ease;
        }

        .time-milliseconds {
            font-size: 44px;
            font-weight: 200;
            background: linear-gradient(180deg, var(--cyan) 0%, #007090 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -2px;
            animation: milliPulse 1s ease-in-out infinite;
        }

        @keyframes milliPulse {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }

        .blink-separator {
            animation: blink 1s step-end infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        /* ============ DATE DISPLAY ============ */
        .date-display {
            position: relative;
            z-index: 3;
            text-align: center;
            font-size: 17px;
            letter-spacing: 4px;
            color: var(--gray);
            font-weight: 300;
        }

        .date-display .highlight {
            color: var(--magenta);
            font-weight: 600;
            font-size: 19px;
        }

        .lunar-phase {
            display: inline-block;
            margin-left: 8px;
            font-size: 16px;
        }

        /* ============ MULTI-CLOCK GRID ============ */
        .clocks-grid {
            position: relative;
            z-index: 3;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            width: 100%;
        }

        .mini-clock {
            background: rgba(255, 255, 255, 0.015);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 20px;
            padding: 16px 14px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .mini-clock:hover {
            background: rgba(255, 255, 255, 0.035);
            border-color: rgba(255, 255, 255, 0.1);
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
        }

        .mini-clock:active {
            transform: scale(0.96);
            transition: transform 0.1s ease;
        }

        .mini-clock-label {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--gray);
            margin-bottom: 6px;
        }

        .mini-clock-value {
            font-size: 22px;
            font-weight: 300;
            color: var(--white);
            font-family: 'SF Mono', 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
            font-variant-numeric: tabular-nums;
        }

        .mini-clock-utc { color: var(--cyan); }
        .mini-clock-epoch { color: var(--gold); font-size: 12px; word-break: break-all; }
        .mini-clock-iso { color: #88ccff; font-size: 11px; }
        .mini-clock-julian { color: var(--green); }

        .mini-clock-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 8px rgba(0, 255, 102, 0.6);
            animation: statusPulse 2s ease-in-out infinite;
        }

        @keyframes statusPulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(1.8); }
        }

        /* ============ ANALOG CLOCK ============ */
        .analog-section {
            position: relative;
            z-index: 3;
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .analog-container {
            width: 180px;
            height: 180px;
            position: relative;
        }

        .analog-face {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.12);
            position: relative;
            background: radial-gradient(circle at center, rgba(20,20,40,0.9) 0%, rgba(10,10,25,0.95) 100%);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.6),
                        inset 0 0 40px rgba(0, 0, 0, 0.4),
                        0 0 0 8px rgba(0, 229, 255, 0.03);
        }

        .analog-face-inner {
            position: absolute;
            top: 8px;
            left: 8px;
            right: 8px;
            bottom: 8px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .analog-center-pin {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 12px;
            height: 12px;
            background: #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 15;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .analog-center-pin::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            height: 4px;
            background: var(--magenta);
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        .tick-mark {
            position: absolute;
            width: 1.5px;
            background: rgba(255, 255, 255, 0.25);
            top: 10px;
            left: 50%;
            transform-origin: 50% 80px;
            transform: translateX(-50%);
        }
        .tick-major { height: 16px; background: rgba(255, 255, 255, 0.5); width: 2px; }
        .tick-minor { height: 8px; }

        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: 50% 100%;
            transform: translateX(-50%);
            border-radius: 3px;
            transition: transform 0.05s cubic-bezier(0.4, 2.3, 0.6, 1);
        }

        .hand-hour {
            width: 5px;
            height: 50px;
            background: #ffffff;
            z-index: 5;
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.3);
        }

        .hand-minute {
            width: 3px;
            height: 68px;
            background: var(--cyan);
            z-index: 6;
            box-shadow: var(--glow-cyan);
        }

        .hand-second {
            width: 1.2px;
            height: 78px;
            background: var(--magenta);
            z-index: 7;
            box-shadow: var(--glow-magenta);
        }

        .hand-second::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            width: 8px;
            height: 8px;
            background: var(--magenta);
            border-radius: 50%;
            transform: translateX(-50%);
        }

        /* ============ PROGRESS BARS ============ */
        .progress-panel {
            position: relative;
            z-index: 3;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .progress-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .progress-label-mini {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--gray);
            width: 55px;
            text-align: right;
            flex-shrink: 0;
        }

        .progress-track {
            flex: 1;
            height: 5px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 3px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.08s linear;
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            right: 0;
            top: -2px;
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: inherit;
            opacity: 0.8;
        }

        .fill-day { background: linear-gradient(90deg, var(--cyan), #00aacc); }
        .fill-week { background: linear-gradient(90deg, var(--magenta), #cc0066); }
        .fill-month { background: linear-gradient(90deg, var(--gold), #cc8800); }
        .fill-year { background: linear-gradient(90deg, var(--green), #00cc44); }

        .progress-percent {
            font-size: 10px;
            color: var(--white);
            width: 50px;
            text-align: left;
            font-family: 'SF Mono', 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
            flex-shrink: 0;
        }

        /* ============ STATUS BAR ============ */
        .status-strip {
            position: relative;
            z-index: 3;
            display: flex;
            gap: 25px;
            align-items: center;
            font-size: 9px;
            letter-spacing: 3px;
            color: var(--gray);
            flex-wrap: wrap;
            justify-content: center;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-led {
            width: 5px;
            height: 5px;
            border-radius: 50%;
        }
        .led-green { background: var(--green); box-shadow: 0 0 10px rgba(0, 255, 102, 0.7); animation: statusPulse 2s ease-in-out infinite; }
        .led-cyan { background: var(--cyan); box-shadow: 0 0 10px rgba(0, 229, 255, 0.7); }
        .led-gold { background: var(--gold); box-shadow: 0 0 10px rgba(255, 184, 0, 0.7); }

        /* ============ TOOLTIP ============ */
        .hover-info {
            cursor: help;
            position: relative;
        }
        .hover-info .info-popup {
            position: absolute;
            bottom: 120%;
            left: 50%;
            transform: translateX(-50%);
            background: #000;
            color: #fff;
            padding: 8px 15px;
            border-radius: 10px;
            font-size: 10px;
            letter-spacing: 1px;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease;
            pointer-events: none;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .hover-info:hover .info-popup {
            opacity: 1;
            visibility: visible;
        }

        /* ============ RESPONSIVE ============ */
        @media (max-width: 900px) {
            .main-card { padding: 28px 24px; border-radius: 28px; gap: 20px; }
            .time-main { font-size: 72px; letter-spacing: -3px; }
            .time-milliseconds { font-size: 28px; }
            .clocks-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .mini-clock-value { font-size: 17px; }
            .mini-clock-epoch { font-size: 10px; }
            .mini-clock-iso { font-size: 9px; }
            .analog-container { width: 130px; height: 130px; }
            .analog-face { width: 130px; height: 130px; }
            .tick-mark { top: 6px; }
            .tick-major { height: 11px; transform-origin: 50% 59px; }
            .tick-minor { height: 6px; transform-origin: 50% 59px; }
            .hand-hour { height: 34px; }
            .hand-minute { height: 48px; }
            .hand-second { height: 56px; }
            .analog-center-pin { width: 9px; height: 9px; }
        }

        @media (max-width: 500px) {
            .main-card { padding: 18px 14px; border-radius: 22px; gap: 14px; }
            .time-main { font-size: 44px; letter-spacing: -2px; }
            .time-milliseconds { font-size: 20px; }
            .time-label-top { font-size: 7px; letter-spacing: 4px; }
            .clocks-grid { grid-template-columns: 1fr 1fr; gap: 6px; }
            .mini-clock { padding: 10px 8px; border-radius: 14px; }
            .mini-clock-value { font-size: 14px; }
            .mini-clock-label { font-size: 7px; letter-spacing: 1px; }
            .date-display { font-size: 13px; letter-spacing: 1px; }
            .analog-section { gap: 15px; }
            .analog-container { width: 100px; height: 100px; }
            .analog-face { width: 100px; height: 100px; }
            .tick-mark { top: 4px; }
            .tick-major { height: 8px; transform-origin: 50% 46px; }
            .tick-minor { height: 4px; transform-origin: 50% 46px; }
            .hand-hour { height: 26px; }
            .hand-minute { height: 36px; }
            .hand-second { height: 42px; }
            .analog-center-pin { width: 7px; height: 7px; }
            .progress-label-mini { width: 40px; font-size: 7px; }
            .progress-percent { width: 38px; font-size: 8px; }
            .status-strip { gap: 10px; font-size: 7px; letter-spacing: 1px; }
            .orbit-1 { width: 340px; height: 340px; }
            .orbit-2 { width: 300px; height: 300px; }
            .orbit-3 { width: 260px; height: 260px; }
            .orbit-4 { width: 220px; height: 220px; }
        }
    </style>
</head>
<body>

    <!-- Multi-layer Canvas Backgrounds -->
    <canvas class="canvas-layer" id="starfieldCanvas"></canvas>
    <canvas class="canvas-layer" id="gridCanvas"></canvas>
    <canvas class="canvas-layer" id="particleCanvas"></canvas>

    <!-- Orbital System -->
    <div class="orbital-system">
        <div class="orbit orbit-1"><div class="orbit-node"></div><div class="orbit-node-2"></div></div>
        <div class="orbit orbit-2"><div class="orbit-node"></div><div class="orbit-node-2"></div></div>
        <div class="orbit orbit-3"><div class="orbit-node"></div><div class="orbit-node-2"></div></div>
        <div class="orbit orbit-4"><div class="orbit-node"></div></div>
    </div>

    <!-- Command Center -->
    <div class="command-center">
        <div class="main-card">
            <!-- Corner Accents -->
            <div class="corner-accent corner-tl"></div>
            <div class="corner-accent corner-tr"></div>
            <div class="corner-accent corner-bl"></div>
            <div class="corner-accent corner-br"></div>

            <!-- Primary Time -->
            <div class="time-section hover-info">
                <div class="time-label-top">● Local Timecode ●</div>
                <div class="time-main">
                    <span id="hr">00</span><span class="blink-separator">:</span><span id="min">00</span><span class="blink-separator">:</span><span id="sec">00</span><span class="time-milliseconds" id="ms">.000</span>
                </div>
                <div class="info-popup">Chronos Nexus v4.0 • Precision Mode Active</div>
            </div>

            <!-- Date -->
            <div class="date-display">
                <span class="highlight" id="dayName">Monday</span> • 
                <span id="monthFull">January</span> 
                <span id="dayNum">01</span> • 
                <span id="yearFull">2025</span>
                <span class="lunar-phase" id="lunarEmoji" title="Lunar Phase">🌕</span>
            </div>

            <!-- Clocks Grid -->
            <div class="clocks-grid">
                <div class="mini-clock">
                    <div class="mini-clock-badge"></div>
                    <div class="mini-clock-label">UTC</div>
                    <div class="mini-clock-value mini-clock-utc" id="utcDisplay">00:00:00</div>
                </div>
                <div class="mini-clock">
                    <div class="mini-clock-badge"></div>
                    <div class="mini-clock-label">UNIX Epoch</div>
                    <div class="mini-clock-value mini-clock-epoch" id="epochDisplay">0000000000</div>
                </div>
                <div class="mini-clock">
                    <div class="mini-clock-badge"></div>
                    <div class="mini-clock-label">ISO 8601</div>
                    <div class="mini-clock-value mini-clock-iso" id="isoDisplay">----</div>
                </div>
                <div class="mini-clock">
                    <div class="mini-clock-badge"></div>
                    <div class="mini-clock-label">Julian Day</div>
                    <div class="mini-clock-value mini-clock-julian" id="julianDisplay">0000000</div>
                </div>
            </div>

            <!-- Analog + Extra Info -->
            <div class="analog-section">
                <div class="analog-container">
                    <div class="analog-face" id="analogFace">
                        <div class="analog-face-inner"></div>
                        <div id="tickMarks"></div>
                        <div class="hand hand-hour" id="handH"></div>
                        <div class="hand hand-minute" id="handM"></div>
                        <div class="hand hand-second" id="handS"></div>
                        <div class="analog-center-pin"></div>
                    </div>
                </div>
                <!-- Additional sub-displays -->
                <div style="display:flex;flex-direction:column;gap:12px;z-index:3;">
                    <div style="text-align:center;">
                        <div style="font-size:8px;letter-spacing:2px;color:var(--gray);">WEEK</div>
                        <div style="font-size:28px;color:var(--magenta);font-weight:300;" id="weekNum">00</div>
                    </div>
                    <div style="text-align:center;">
                        <div style="font-size:8px;letter-spacing:2px;color:var(--gray);">DAY OF YEAR</div>
                        <div style="font-size:24px;color:var(--gold);font-weight:300;" id="doyNum">000</div>
                    </div>
                </div>
            </div>

            <!-- Progress Panel -->
            <div class="progress-panel">
                <div class="progress-row">
                    <div class="progress-label-mini">DAY</div>
                    <div class="progress-track"><div class="progress-fill fill-day" id="barDay"></div></div>
                    <div class="progress-percent" id="pctDay">0%</div>
                </div>
                <div class="progress-row">
                    <div class="progress-label-mini">WEEK</div>
                    <div class="progress-track"><div class="progress-fill fill-week" id="barWeek"></div></div>
                    <div class="progress-percent" id="pctWeek">0%</div>
                </div>
                <div class="progress-row">
                    <div class="progress-label-mini">MONTH</div>
                    <div class="progress-track"><div class="progress-fill fill-month" id="barMonth"></div></div>
                    <div class="progress-percent" id="pctMonth">0%</div>
                </div>
                <div class="progress-row">
                    <div class="progress-label-mini">YEAR</div>
                    <div class="progress-track"><div class="progress-fill fill-year" id="barYear"></div></div>
                    <div class="progress-percent" id="pctYear">0%</div>
                </div>
            </div>

            <!-- Status Strip -->
            <div class="status-strip">
                <span class="status-item"><span class="status-led led-green"></span> ALL SYSTEMS NOMINAL</span>
                <span class="status-item" id="tzDisplay"><span class="status-led led-cyan"></span> UTC±0</span>
                <span class="status-item"><span class="status-led led-gold"></span> <span id="fpsCounter">60</span> FPS</span>
                <span class="status-item" id="dstDisplay">DST: --</span>
            </div>
        </div>
    </div>

    <script>
        // ==============================================
        // CHRONOS NEXUS v4.0 - Temporal Command System
        // ==============================================

        // ---------- STARFIELD CANVAS ----------
        const starCanvas = document.getElementById('starfieldCanvas');
        const starCtx = starCanvas.getContext('2d');
        let stars = [];

        function resizeStarCanvas() {
            starCanvas.width = window.innerWidth;
            starCanvas.height = window.innerHeight;
            initStars();
        }

        function initStars() {
            const count = Math.floor((starCanvas.width * starCanvas.height) / 1800);
            stars = [];
            for (let i = 0; i < count; i++) {
                stars.push({
                    x: Math.random() * starCanvas.width,
                    y: Math.random() * starCanvas.height,
                    r: Math.random() * 1.4 + 0.3,
                    twinkleSpeed: Math.random() * 0.015 + 0.005,
                    twinkleOffset: Math.random() * Math.PI * 2,
                    hue: Math.random() < 0.1 ? 200 : Math.random() < 0.05 ? 330 : 0
                });
            }
        }

        function drawStars(timestamp) {
            starCtx.clearRect(0, 0, starCanvas.width, starCanvas.height);
            stars.forEach(s => {
                const alpha = 0.3 + Math.sin(timestamp * s.twinkleSpeed + s.twinkleOffset) * 0.35 + 0.35;
                starCtx.beginPath();
                starCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                if (s.hue === 200) {
                    starCtx.fillStyle = `rgba(100, 200, 255, ${alpha})`;
                } else if (s.hue === 330) {
                    starCtx.fillStyle = `rgba(255, 100, 180, ${alpha})`;
                } else {
                    starCtx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                }
                starCtx.fill();
            });
        }

        // ---------- GRID CANVAS ----------
        const gridCanvas = document.getElementById('gridCanvas');
        const gridCtx = gridCanvas.getContext('2d');

        function resizeGridCanvas() {
            gridCanvas.width = window.innerWidth;
            gridCanvas.height = window.innerHeight;
        }

        function drawGrid(timestamp) {
            gridCtx.clearRect(0, 0, gridCanvas.width, gridCanvas.height);
            const spacing = 70;
            const offset = (timestamp * 0.008) % spacing;
            
            gridCtx.strokeStyle = 'rgba(0, 229, 255, 0.025)';
            gridCtx.lineWidth = 0.5;
            
            // Vertical lines
            for (let x = offset; x < gridCanvas.width; x += spacing) {
                gridCtx.beginPath();
                gridCtx.moveTo(x, 0);
                gridCtx.lineTo(x, gridCanvas.height);
                gridCtx.stroke();
            }
            // Horizontal lines
            for (let y = offset; y < gridCanvas.height; y += spacing) {
                gridCtx.beginPath();
                gridCtx.moveTo(0, y);
                gridCtx.lineTo(gridCanvas.width, y);
                gridCtx.stroke();
            }
        }

        // ---------- PARTICLE CANVAS ----------
        const particleCanvas = document.getElementById('particleCanvas');
        const particleCtx = particleCanvas.getContext('2d');
        let particles = [];

        function resizeParticleCanvas() {
            particleCanvas.width = window.innerWidth;
            particleCanvas.height = window.innerHeight;
            updateParticleBudget();
        }

        function updateParticleBudget() {
            const target = Math.min(Math.floor((particleCanvas.width * particleCanvas.height) / 20000), 150);
            while (particles.length < target) {
                particles.push(createParticle());
            }
            particles.length = target;
        }

        function createParticle() {
            return {
                x: Math.random() * particleCanvas.width,
                y: Math.random() * particleCanvas.height,
                vx: (Math.random() - 0.5) * 0.3,
                vy: -Math.random() * 0.5 - 0.15,
                size: Math.random() * 2 + 0.5,
                life: Math.random(),
                maxLife: Math.random() * 0.8 + 0.4,
                hue: Math.random() < 0.6 ? 190 : 330
            };
        }

        function updateParticles() {
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life += 0.002;
                if (p.y < -10 || p.life > p.maxLife || p.x < -10 || p.x > particleCanvas.width + 10) {
                    Object.assign(p, createParticle());
                    p.y = particleCanvas.height + 10;
                }
            });
        }

        function drawParticles() {
            particleCtx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
            particles.forEach(p => {
                const alpha = Math.sin(p.life / p.maxLife * Math.PI) * 0.6;
                particleCtx.beginPath();
                particleCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                if (p.hue === 190) {
                    particleCtx.fillStyle = `rgba(0, 229, 255, ${alpha})`;
                } else {
                    particleCtx.fillStyle = `rgba(255, 0, 136, ${alpha})`;
                }
                particleCtx.fill();
            });
        }

        // ---------- ANALOG CLOCK TICKS ----------
        function buildTickMarks() {
            const container = document.getElementById('tickMarks');
            container.innerHTML = '';
            for (let i = 0; i < 60; i++) {
                const tick = document.createElement('div');
                tick.className = 'tick-mark' + (i % 5 === 0 ? ' tick-major' : ' tick-minor');
                tick.style.transform = `translateX(-50%) rotate(${i * 6}deg)`;
                container.appendChild(tick);
            }
        }

        // ---------- LUNAR PHASE CALCULATION ----------
        function getLunarPhase(date) {
            const lp = 2551443; // lunar period in seconds
            const newMoon = new Date(2000, 0, 6, 18, 14, 0).getTime() / 1000;
            const phase = ((date.getTime() / 1000 - newMoon) % lp) / lp;
            const phaseIndex = Math.round(phase * 8) % 8;
            const emojis = ['🌑', '🌒', '🌓', '🌔', '🌕', '🌖', '🌗', '🌘'];
            return { emoji: emojis[phaseIndex], index: phaseIndex };
        }

        // ---------- JULIAN DAY ----------
        function getJulianDay(date) {
            const y = date.getUTCFullYear();
            const m = date.getUTCMonth() + 1;
            const d = date.getUTCDate() + 
                      date.getUTCHours() / 24 + 
                      date.getUTCMinutes() / 1440 + 
                      date.getUTCSeconds() / 86400 + 
                      date.getUTCMilliseconds() / 86400000;
            let jy = y;
            let jm = m;
            if (m <= 2) { jy--; jm += 12; }
            const A = Math.floor(jy / 100);
            const B = 2 - A + Math.floor(A / 4);
            return Math.floor(365.25 * (jy + 4716)) + Math.floor(30.6001 * (jm + 1)) + d + B - 1524.5;
        }

        // ---------- ISO WEEK ----------
        function getISOWeek(date) {
            const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
            const dayNum = d.getUTCDay() || 7;
            d.setUTCDate(d.getUTCDate() + 4 - dayNum);
            const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
            return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
        }

        // ---------- DAY OF YEAR ----------
        function getDayOfYear(date) {
            const start = new Date(date.getFullYear(), 0, 0);
            const diff = date - start;
            return Math.floor(diff / 86400000);
        }

        // ---------- DST DETECTION ----------
        function isDST(date) {
            const jan = new Date(date.getFullYear(), 0, 1).getTimezoneOffset();
            const jul = new Date(date.getFullYear(), 6, 1).getTimezoneOffset();
            return date.getTimezoneOffset() < Math.max(jan, jul);
        }

        // ---------- FPS COUNTER ----------
        let fpsFrames = 0;
        let fpsLastTime = performance.now();
        let currentFPS = 60;

        // ---------- MAIN UPDATE LOOP ----------
        function nexusUpdate(timestamp) {
            const now = new Date();
            const h = now.getHours();
            const m = now.getMinutes();
            const s = now.getSeconds();
            const ms = now.getMilliseconds();
            const day = now.getDay();
            const date = now.getDate();
            const month = now.getMonth();
            const year = now.getFullYear();

            // Digital time
            document.getElementById('hr').textContent = String(h).padStart(2, '0');
            document.getElementById('min').textContent = String(m).padStart(2, '0');
            document.getElementById('sec').textContent = String(s).padStart(2, '0');
            document.getElementById('ms').textContent = '.' + String(ms).padStart(3, '0');

            // Date
            const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
            const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
            document.getElementById('dayName').textContent = dayNames[day];
            document.getElementById('monthFull').textContent = monthNames[month];
            document.getElementById('dayNum').textContent = String(date).padStart(2, '0');
            document.getElementById('yearFull').textContent = year;
            document.getElementById('lunarEmoji').textContent = getLunarPhase(now).emoji;

            // UTC
            document.getElementById('utcDisplay').textContent = 
                `${String(now.getUTCHours()).padStart(2,'0')}:${String(now.getUTCMinutes()).padStart(2,'0')}:${String(now.getUTCSeconds()).padStart(2,'0')}`;

            // Epoch
            document.getElementById('epochDisplay').textContent = Math.floor(now.getTime() / 1000);

            // ISO 8601
            const iso = now.toISOString().replace('T', ' ').slice(0, 19);
            document.getElementById('isoDisplay').textContent = iso;

            // Julian
            document.getElementById('julianDisplay').textContent = getJulianDay(now).toFixed(4);

            // Week & DOY
            document.getElementById('weekNum').textContent = String(getISOWeek(now)).padStart(2, '0');
            document.getElementById('doyNum').textContent = String(getDayOfYear(now)).padStart(3, '0');

            // Analog hands
            const hDeg = (h % 12) * 30 + m * 0.5 + s * (0.5 / 60);
            const mDeg = m * 6 + s * 0.1 + ms * 0.0001;
            const sDeg = s * 6 + ms * 0.006;
            document.getElementById('handH').style.transform = `translateX(-50%) rotate(${hDeg}deg)`;
            document.getElementById('handM').style.transform = `translateX(-50%) rotate(${mDeg}deg)`;
            document.getElementById('handS').style.transform = `translateX(-50%) rotate(${sDeg}deg)`;

            // Progress bars
            const secInDay = h * 3600 + m * 60 + s + ms / 1000;
            const dayPct = (secInDay / 86400) * 100;
            document.getElementById('barDay').style.width = dayPct + '%';
            document.getElementById('pctDay').textContent = dayPct.toFixed(2) + '%';

            const weekPct = ((day * 86400 + secInDay) / 604800) * 100;
            document.getElementById('barWeek').style.width = weekPct + '%';
            document.getElementById('pctWeek').textContent = weekPct.toFixed(2) + '%';

            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const monthPct = (((date - 1) * 86400 + secInDay) / (daysInMonth * 86400)) * 100;
            document.getElementById('barMonth').style.width = monthPct + '%';
            document.getElementById('pctMonth').textContent = monthPct.toFixed(2) + '%';

            const startYear = new Date(year, 0, 1).getTime();
            const endYear = new Date(year + 1, 0, 1).getTime();
            const yearPct = ((now.getTime() - startYear) / (endYear - startYear)) * 100;
            document.getElementById('barYear').style.width = yearPct + '%';
            document.getElementById('pctYear').textContent = yearPct.toFixed(3) + '%';

            // Timezone
            const offsetM = now.getTimezoneOffset();
            const offH = -offsetM / 60;
            const sign = offH >= 0 ? '+' : '';
            document.getElementById('tzDisplay').innerHTML = 
                `<span class="status-led led-cyan"></span> UTC${sign}${offH}:${String(Math.abs(offsetM % 60)).padStart(2,'0')}`;

            // DST
            document.getElementById('dstDisplay').textContent = 'DST: ' + (isDST(now) ? 'ACTIVE' : 'OFF');

            // FPS
            fpsFrames++;
            if (timestamp - fpsLastTime >= 1000) {
                currentFPS = fpsFrames;
                fpsFrames = 0;
                fpsLastTime = timestamp;
            }
            document.getElementById('fpsCounter').textContent = currentFPS;

            // Canvases
            drawStars(timestamp);
            drawGrid(timestamp);
            updateParticles();
            drawParticles();

            requestAnimationFrame(nexusUpdate);
        }

        // ---------- INITIALIZATION ----------
        function initAll() {
            resizeStarCanvas();
            resizeGridCanvas();
            resizeParticleCanvas();
            buildTickMarks();
            requestAnimationFrame(nexusUpdate);
        }

        window.addEventListener('resize', () => {
            resizeStarCanvas();
            resizeGridCanvas();
            resizeParticleCanvas();
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            switch(e.key.toLowerCase()) {
                case 'f':
                    if (!document.fullscreenElement) {
                        document.documentElement.requestFullscreen().catch(() => {});
                    } else {
                        document.exitFullscreen();
                    }
                    break;
                case 'd':
                    document.documentElement.classList.toggle('dark-mode');
                    break;
                case 'r':
                    // Reset particles
                    particles = [];
                    updateParticleBudget();
                    break;
            }
        });

        // Double-click for fullscreen
        document.addEventListener('dblclick', (e) => {
            if (e.target.tagName !== 'BUTTON' && e.target.tagName !== 'INPUT') {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(() => {});
                } else {
                    document.exitFullscreen();
                }
            }
        });

        initAll();

        console.log('%c⏱ CHRONOS NEXUS v4.0 %cONLINE',
            'color: #00e5ff; font-size: 20px; font-weight: bold;',
            'color: #00ff66; font-size: 14px;');
        console.log('%cTemporal Command System • All Vectors Nominal',
            'color: #6a6a8a; font-size: 10px; letter-spacing: 2px;');
        console.log('%cKeyboard: F=Fullscreen | R=Reset Particles | DblClick=Fullscreen',
            'color: #ffb800; font-size: 9px;');
    </script>
</body>
</html>
